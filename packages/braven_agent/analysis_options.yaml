include: package:flutter_lints/flutter.yaml

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options

analyzer:
  errors:
    # Ignore deprecation warnings from Flutter framework updates
    deprecated_member_use: ignore
    # Style preferences
    prefer_initializing_formals: ignore
    # Path dependencies are valid for local development packages
    invalid_dependency: ignore

linter:
  rules:
    # Library naming - allow named libraries for documentation purposes
    unnecessary_library_name: false

    # Immutability and const patterns
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_final_fields: true
    prefer_final_locals: true

    # Enum exhaustiveness
    exhaustive_cases: true

    # Code quality
    avoid_print: true
    avoid_unnecessary_containers: true
    prefer_single_quotes: true
