adversarial_checks:
  - id: "uses_previous_types"
    description: "Uses YAxisConfig, SeriesAxisBinding, NormalizationMode from Tasks 1-4"
    check: "Does NOT redefine these types"
    
  - id: "helper_methods_work"
    description: "Helper methods return correct results"
    check: "Tests cover getAxisById, getAxisForSeries edge cases"

minimum_tests: 15

notes: |
  Task 5 brings together all foundation pieces:
  - YAxisConfig (Task 2) - List of axis configurations
  - SeriesAxisBinding (Task 3) - List of series-axis bindings
  - NormalizationMode (Task 4) - Mode controlling when to normalize
  
  This is the container that will be passed to the chart widget.
  Helper methods make it easy to look up axes and bindings.
