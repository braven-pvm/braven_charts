notes: |
  INTEGRATION TASK - modifies public API
  
  Key deliverables:
  1. ChartSeries gains yAxisId (optional String?) for explicit axis binding
  2. ChartSeries gains unit (optional String?) for formatting
  3. Validation prevents >4 axes
  4. Validation prevents duplicate axis positions (two left, two right, etc.)
  5. Full API documentation
  
  The yAxisId field provides an alternative to SeriesAxisBinding for simpler use cases.
  When yAxisId is set on a series, it should take precedence over axisBindings parameter.
