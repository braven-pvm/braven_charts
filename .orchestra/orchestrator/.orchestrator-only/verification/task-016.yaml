# Files expected to be created/modified
expected_files:
  create:
    - path: "test/golden/multi_axis/.gitkeep"
      purpose: "Create golden test directory"
    - path: "test/golden/multi_axis/two_axis_chart_test.dart"
      purpose: "Golden test for 2-axis configuration"
    - path: "test/golden/multi_axis/four_axis_chart_test.dart"
      purpose: "Golden test for 4-axis configuration"
    - path: "test/golden/multi_axis/colored_axes_test.dart"
      purpose: "Golden test for color-coded axes"
    - path: "test/widget/multi_axis/backward_compat_test.dart"
      purpose: "Verify single-axis mode unchanged"
    - path: "test/benchmarks/multi_axis_benchmark.dart"
      purpose: "Performance validation (60 FPS with 4 series × 1000 points)"
    - path: "example/lib/demos/task_016_showcase_demo.dart"
      purpose: "Comprehensive showcase of all multi-axis features"
      
  modify:
    - path: "CHANGELOG.md"
      changes: "Add multi-axis normalization feature entry"

# Test expectations
test_expectations:
  baseline: 262
  minimum_new: 20  # Golden tests + backward compat + benchmark
  minimum_total: 280

# Screenshot verification
screenshot:
  required: true
  path: ".orchestra/orchestrator/results/screenshots/task-016-showcase.png"
  verify:
    - "Chart displays with multiple Y-axes (left and right)"
    - "Each axis has distinct color matching its series"
    - "All series use full vertical space despite different ranges"
    - "Axis labels show original values (not normalized 0-1)"
    - "Crosshair or tooltip visible showing original value"

# Adversarial checks
adversarial:
  - scenario: "Demo runs without any additional setup"
    check: "flutter run -t example/lib/demos/task_016_showcase_demo.dart -d chrome works"
    
  - scenario: "Golden tests generate/compare correctly"
    check: "flutter test test/golden/multi_axis/ --update-goldens creates baseline images"
    
  - scenario: "Single-axis chart still works"
    check: "Existing single-axis examples render identically to before sprint"

notes: |
  FINAL TASK - Sprint Capstone
  
  This task brings together all 15 previous tasks into a working demonstration.
  It creates:
  1. Golden tests for visual regression (future-proofing)
  2. Comprehensive showcase demo (developer experience)
  3. Backward compatibility proof (no regressions)
  4. Performance validation (production readiness)
  5. Documentation updates (discoverability)
  
  The demo should be impressive - it's the "proof" that the sprint succeeded.
  All 4 user stories should be visible in a single chart or tabbed view.
