# Verification Criteria - Task 2
# ⚠️ HIDDEN FROM IMPLEMENTOR AGENT

task_id: 2
title: "Create Y-Axis Configuration Model"

depends_on: [1]

verification_criteria:
  structural:
    - file_exists: "lib/src/axis/y_axis_config.dart"
    - exports_from: "lib/braven_charts.dart"
    
  functional:
    - class_exists: "YAxisConfig"
    - has_property: "id (String)"
    - has_property: "position (YAxisPosition)"
    - has_property: "color (Color?)"
    - has_property: "label (String?)"
    - has_property: "unitSuffix (String?)"
    - has_property: "minValue (double?)"
    - has_property: "maxValue (double?)"
    - uses_dependency: "YAxisPosition from task 1"
    
  integration:
    - instantiable: "YAxisConfig(id: 'power', position: YAxisPosition.left)"

verification_commands:
  - description: "File exists"
    command: "Test-Path lib/src/axis/y_axis_config.dart"
    expected: "True"
    
  - description: "Uses YAxisPosition"
    command: "Select-String -Path lib/src/axis/y_axis_config.dart -Pattern 'YAxisPosition'"
    expected: "match found"
    
  - description: "Has required properties"
    command: "Select-String -Path lib/src/axis/y_axis_config.dart -Pattern 'final String id|final YAxisPosition position'"
    expected: "2 matches"

failure_indicators:
  - "Doesn't use YAxisPosition from task 1"
  - "Missing required properties"
  - "Not a const/immutable class"
