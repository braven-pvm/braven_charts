adversarial_checks:
  - check: "Uses per-axis bounds, not global yMin/yMax"
    severity: BLOCKING
    file: "lib/src/rendering/chart_render_box.dart"
    search: "dataToScreenY.*yMin.*yMax"
    expected: "NOT FOUND or replaced with per-axis version"
    rationale: |
      The bug is using global yMin/yMax for all series. The fix must use
      per-axis bounds. Search for old pattern should NOT find it.

  - check: "Uses SeriesAxisResolver or equivalent"
    severity: MAJOR
    file: "lib/src/rendering/chart_render_box.dart"
    search: "SeriesAxisResolver|resolveAxisId|getAxisForSeries"
    expected: "FOUND - must resolve axis for series"
    rationale: |
      To get per-axis bounds, must first know which axis the series belongs to.

  - check: "Uses MultiAxisNormalizer.computeAxisBounds or equivalent"
    severity: MAJOR
    file: "lib/src/rendering/chart_render_box.dart"
    search: "computeAxisBounds|getAxisBounds|axisBounds"
    expected: "FOUND - must compute per-axis bounds"
    rationale: |
      Task 6 created computeAxisBounds(). This should be used or equivalent.

  - check: "Demo file created"
    severity: MAJOR
    command: "Test-Path example/lib/demos/task_013_crosshair_demo.dart"
