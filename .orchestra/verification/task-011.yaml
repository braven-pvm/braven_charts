# Verification Criteria - Task 11 (Critical Integration Task)
# ⚠️ HIDDEN FROM IMPLEMENTOR AGENT

task_id: 11
title: "Integrate Multi-Axis Painter with Chart Widget"

depends_on: [9, 10]

# THIS IS AN INTEGRATION TASK - SPECIAL VERIFICATION REQUIRED

verification_criteria:
  structural:
    - modifies_existing: "lib/src/widgets/braven_chart_plus.dart"
    - modifies_existing: "lib/src/painters/chart_painter.dart"
    
  functional:
    - widget_accepts_config: "BravenChartPlus has MultiAxisConfig parameter"
    - config_passed_to_painter: "Painter receives the config"
    - painter_uses_config: "MultiAxisPainter is used when config present"
    
  visual:
    - screenshot_required: true
    - screenshot_shows: "Chart with 2+ colored Y-axes visible"

verification_commands:
  - description: "BravenChartPlus accepts axis config"
    command: "Select-String -Path lib/src/widgets/braven_chart_plus.dart -Pattern 'MultiAxisConfig|axisConfig'"
    expected: "match found"
    critical: true
    
  - description: "Config flows to painter"
    command: "Select-String -Path lib/src/widgets/braven_chart_plus.dart -Pattern 'painter.*axis|MultiAxisPainter'"
    expected: "match found"
    
  - description: "Git diff shows widget file modified"
    command: "git diff --name-only HEAD | Select-String 'braven_chart'"
    expected: "match found"
    critical: true

# ADVERSARIAL VERIFICATION
adversarial_checks:
  - description: "Remove axis config from widget call - does it still compile?"
    action: "If different behavior, integration real. If same, fake."
    
  - description: "Pass 4 different axis colors - do 4 colored axes appear?"
    action: "Visual check required"

screenshot_requirements:
  filename: "task-011-multi-axis-integration.png"
  must_show:
    - "At least 2 Y-axes visible"
    - "Axes have different colors"
    - "Data series rendered"
  location: ".orchestra/artifacts/screenshots/"

failure_indicators:
  - "Widget doesn't accept axis configuration parameter"
  - "Config accepted but not passed to painter"
  - "MultiAxisPainter created but not used"
  - "Screenshot shows single axis only"
