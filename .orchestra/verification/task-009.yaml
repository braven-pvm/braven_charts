design_error:
  issue: "Screenshot requirement misplaced on capability-building task"
  original_criteria: "screenshot_shows: Multiple colored axes visible on chart"
  problem: |
    Task 9 creates a CustomPainter class - you cannot screenshot a class.
    The painter must be integrated into a widget (Task 10) before visual verification is possible.
    This mismatch creates a loophole for implementation theater.
  resolution: "Screenshot verification moved to Task 10 (integration task)"
  lesson: |
    TASK-VERIFICATION ALIGNMENT RULE: Every verification criterion MUST be 
    satisfiable by the task's explicit deliverables alone. If a criterion 
    requires output from a future task, it belongs on that future task.
  logged_in: "RESEARCH_LOG.md - Challenges Encountered - Section 4"

verification_criteria:
