# Verification Criteria - Task 9
# ⚠️ HIDDEN FROM IMPLEMENTOR AGENT

task_id: 9
title: "Create Multi-Axis Painter"

phase: "rendering"
depends_on: [6, 7, 8]

# TDD REQUIRED + VISUAL VERIFICATION
tdd_required: true
visual_required: true

verification_criteria:
  structural:
    - file_exists: "lib/src/painters/multi_axis_painter.dart"
    - test_file_exists: "test/unit/painters/multi_axis_painter_test.dart"
    - exports_from: "lib/braven_charts.dart"
    
  functional:
    - extends_custom_painter: "Must extend CustomPainter or integrate with existing"
    - paints_multiple_axes: "Can render 2-4 Y-axes"
    - uses_axis_config: "Reads from YAxisConfig for positioning/styling"
    - uses_normalized_data: "Renders using normalized 0-1 values"
    
  test_requirements:
    - min_test_count: 4
    - required_cases:
      - "paints single axis correctly"
      - "paints multiple axes at correct positions"
      - "applies axis colors"
      - "renders tick marks and labels"

  visual_requirements:
    - screenshot_required: true
    - screenshot_shows: "Multiple colored axes visible on chart"

verification_commands:
  - description: "Tests pass"
    command: "flutter test test/unit/painters/multi_axis_painter_test.dart"
    expected: "All tests passed"
    critical: true

failure_indicators:
  - "Painter created but not connected to chart"
  - "Axes render but all same color"
  - "Only single axis supported despite claims"
