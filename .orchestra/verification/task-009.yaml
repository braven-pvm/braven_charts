minimum_tests: 15  # Layout + painting tests

notes: |
  Task 9 creates the visual rendering infrastructure for multiple Y-axes.
  
  Key components:
  1. MultiAxisPainter - Paints multiple Y-axes with proper positioning
  2. MultiAxisLayoutDelegate - Computes axis widths based on content
  3. AxisLayoutManager - Manages positioning (outerLeft, left, right, outerRight)
  
  Must use existing:
  - YAxisConfig from lib/src/models/y_axis_config.dart
  - YAxisPosition from lib/src/models/y_axis_position.dart
  - MultiAxisNormalizer for denormalization of tick values
  - DataRange for axis bounds
  
  FR-001: 4 positions (outerLeft, left, right, outerRight)
  FR-005: Labels show original values, not normalized
  FR-007: Color-coding support (foundation for Task 10)
