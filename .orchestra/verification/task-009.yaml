    - exports_from: "lib/braven_charts.dart"
    
  functional:
    - extends_custom_painter: "Must extend CustomPainter or integrate with existing"
    - paints_multiple_axes: "Can render 2-4 Y-axes"
    - uses_axis_config: "Reads from YAxisConfig for positioning/styling"
    - uses_normalized_data: "Renders using normalized 0-1 values"
    
  test_requirements:
    - min_test_count: 4
    - required_cases:
