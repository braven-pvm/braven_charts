      - "handles empty series list"

verification_commands:
  - description: "Test file exists"
    command: "Test-Path test/unit/axis/normalization_detector_test.dart"
    expected: "True"
    critical: true
    
  - description: "Tests pass"
    command: "flutter test test/unit/axis/normalization_detector_test.dart"
    expected: "All tests passed"
    critical: true

failure_indicators:
  - "No test file"
  - "Detection logic doesn't use threshold"
  - "Hardcoded behavior instead of configurable"
