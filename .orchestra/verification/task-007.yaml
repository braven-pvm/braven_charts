task_id: 7
title: "Implement Auto-Detection Logic"

phase: "normalization"
depends_on: [6]

# TDD REQUIRED
tdd_required: true

verification_criteria:
  structural:
    - file_exists: "lib/src/axis/normalization_detector.dart"
    - test_file_exists: "test/unit/axis/normalization_detector_test.dart"
    - exports_from: "lib/braven_charts.dart"
    
  functional:
    - detects_range_difference: "Identifies when series ranges differ by threshold"
    - configurable_threshold: "Threshold is configurable (default 10x)"
    - returns_mode: "Returns appropriate NormalizationMode"
    
  test_requirements:
    - min_test_count: 5
    - required_cases:
      - "returns none when ranges similar"
      - "returns auto/always when ranges differ >10x"
      - "respects custom threshold"
