# Verification Criteria - Task 16 (Final Demo)
# ⚠️ HIDDEN FROM IMPLEMENTOR AGENT

task_id: 16
title: "Create Working Demo Example"

depends_on: [15]

# THIS IS THE FINAL PROOF - ENTIRE FEATURE MUST WORK

verification_criteria:
  structural:
    - file_exists: "example/lib/demos/multi_axis_demo.dart"
    - demo_runnable: "flutter run -t example/lib/demos/multi_axis_demo.dart"
    
  functional:
    - uses_public_api: "Only uses exported BravenChartPlus API"
    - shows_feature: "Demonstrates multi-axis with different scales"
    - all_stories_addressed: "P1 user story is visually verified"
    
  visual:
    - screenshot_required: true
    - screenshot_shows:
      - "4 data series with vastly different ranges"
      - "4 color-coded Y-axes"
      - "All series using full vertical height"
      - "Tooltip showing original values"

verification_commands:
  - description: "Demo file exists"
    command: "Test-Path example/lib/demos/multi_axis_demo.dart"
    expected: "True"
    
  - description: "Demo compiles"
    command: "cd example; flutter analyze lib/demos/multi_axis_demo.dart"
    expected: "exit code 0"
    
  - description: "Demo runs without crash"
    command: "cd example; flutter run -d chrome -t lib/demos/multi_axis_demo.dart"
    expected: "Renders without error"

# FINAL ADVERSARIAL CHECKS
adversarial_checks:
  - description: "Does the demo match the P1 user story exactly?"
    story: |
      Power (0-300W), Tidal Volume (0.5-4.0L), Respiratory Rate (10-40 bpm)
      All metrics visible, using full height, with color-coded axes
    action: "Visual comparison required"
    
  - description: "Remove MultiAxisConfig - does demo break or just show flat lines?"
    action: "If flat lines appear, feature actually works"
    
  - description: "Hover over data point - does tooltip show original values?"
    action: "Must show '240 W' not '0.8' or similar normalized value"

screenshot_requirements:
  filename: "task-016-final-demo.png"
  must_show:
    - "Multiple series with different scales"
    - "Multiple colored Y-axes"
    - "No flat-line effect"
    - "Professional appearance"
  location: ".orchestra/artifacts/screenshots/"

# SUCCESS CRITERIA FROM SPEC
success_criteria_check:
  - "SC-002: 100% of series span at least 80% vertical height"
  - "SC-003: Color-coded axes identifiable within 2 seconds"
  - "SC-004: All displayed Y-values match original data"
  - "SC-005: Single-axis charts still work (backward compatible)"

failure_indicators:
  - "Demo doesn't run"
  - "Demo runs but shows single axis"
  - "Demo shows multi-axis but series are flat lines"
  - "Tooltips show normalized values instead of originals"
  - "Colors don't match between series and axes"
