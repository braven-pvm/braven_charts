# Verification Criteria - Task 10
# ⚠️ HIDDEN FROM IMPLEMENTOR AGENT

task_id: 10
title: "Integrate Multi-Axis Painter with BravenChart"

phase: "rendering"
depends_on: [9]

# VISUAL VERIFICATION CRITICAL
# NOTE: This task now includes visual verification that was incorrectly placed on Task 9
visual_required: true

# NOTE: Original Task 10 was "Implement Color-Coded Axis Rendering" but Task 9 
# already implemented colors. This task should focus on INTEGRATION of the 
# MultiAxisPainter into BravenChart widget, which enables visual verification.

verification_criteria:
  structural:
    - modifies_existing: "lib/src/widgets/braven_chart.dart"
    - uses_painter: "MultiAxisPainter is instantiated in chart painting"
    
  functional:
    - painter_integrated: "MultiAxisPainter called during chart paint cycle"
    - axes_positioned: "Each axis renders at correct position (left/right/outer)"
    - axis_color_from_config: "Each axis uses color from YAxisConfig"
    - fallback_color: "Uses theme default if no color specified"
    - all_elements_colored: "Ticks, labels, and axis line all match"
    
  visual_requirements:
    - screenshot_required: true
    - screenshot_filename: "task-010-multi-axis-integration.png"
    - screenshot_shows:
      - "Multiple Y-axes visible on chart (left and right sides)"
      - "At least 2 axes with different colors"
      - "Axis labels match axis line color"
      - "Tick marks visible with values"
      - "Chart data renders between the axes"

verification_commands:
  - description: "Git diff shows braven_chart.dart modified"
    command: "git diff --name-only HEAD | Select-String 'braven_chart'"
    expected: "match found"
    critical: true
    
  - description: "MultiAxisPainter is imported and used"
    command: "Select-String -Path lib/src/widgets/braven_chart.dart -Pattern 'MultiAxisPainter'"
    expected: "match found"
    critical: true

failure_indicators:
  - "Painter exists but never instantiated in chart"
  - "Colors defined but not applied to rendering"
  - "Only axis line colored, labels still default"
  - "Screenshot shows monochrome axes"
  - "Axes render but not positioned correctly"
