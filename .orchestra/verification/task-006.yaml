verification_checks:
  # --- File Existence ---
  - id: "normalizer_implementation_exists"
    description: "MultiAxisNormalizer class exists in expected location"
    command: "Test-Path 'lib/src/rendering/multi_axis_normalizer.dart'"
    expected: "True"
    
  - id: "normalization_test_exists"
    description: "Per-axis normalization test file exists"
    command: "Test-Path 'test/unit/multi_axis/normalization_test.dart'"
