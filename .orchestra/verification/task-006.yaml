    description: "Denormalize(Normalize(value)) returns original value"
    check: "Round-trip test verifies value preservation within floating-point tolerance"

# =============================================================================
# ADVERSARIAL CHECKS
# =============================================================================

adversarial_checks:
  - id: "edge_case_zero_range"
    description: "Handles zero range (min == max)"
    check: "Series with constant Y value normalizes without division by zero"
    
  - id: "edge_case_single_point"
    description: "Handles single data point"
    check: "Series with one point uses reasonable default bounds"
    
  - id: "edge_case_negative_values"
    description: "Handles negative Y values correctly"
    check: "Series crossing zero (e.g., -50 to +50) normalizes correctly"
    
  - id: "edge_case_very_small_range"
    description: "Handles very small ranges (e.g., 0.001 difference)"
    check: "Precision is maintained for small numeric ranges"
    
  - id: "edge_case_very_large_values"
    description: "Handles large values without overflow"
    check: "Values in billions range normalize without precision loss"

  - id: "multiple_series_same_axis"
    description: "Computes union bounds for multiple series on same axis"
    check: "When 2 series share axis, bounds are min(mins) to max(maxes)"

# =============================================================================
# CONTRACT COMPLIANCE (Critical!)
# =============================================================================

contract_compliance:
  - id: "fr_004_internal_normalization"
    spec_requirement: "FR-004"
    description: "System MUST internally normalize each series to full plot height while preserving original values"
    check: "Normalized values span [0,1], original values recoverable via denormalize"
    
  - id: "fr_003_per_axis_bounds"
    spec_requirement: "FR-003"
    description: "Each Y-axis MUST maintain its own data bounds (min/max)"
    check: "axisBounds map stores separate bounds per axis ID"
    
  - id: "user_story_1_full_height"
    spec_requirement: "US1"
    description: "All series span full vertical height of plot area"
    check: "Normalized series values use full [0,1] range"

