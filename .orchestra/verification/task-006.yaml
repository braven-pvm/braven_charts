    description: "Axis bounds test file exists"
    command: "Test-Path 'test/unit/multi_axis/axis_bounds_test.dart'"
    expected: "True"

  # --- TDD Compliance ---
  - id: "tdd_tests_written_first"
    description: "Tests reference normalizer functionality (TDD pattern)"
    check: "Tests should import MultiAxisNormalizer and test its core methods"

  # --- Core Functionality ---
  - id: "normalize_method_exists"
    description: "Normalizer has normalize method"
    check: "MultiAxisNormalizer.normalize(value, min, max) exists and returns [0,1] range"
    
  - id: "denormalize_method_exists"
    description: "Normalizer has denormalize method"
    check: "MultiAxisNormalizer.denormalize(normalized, min, max) exists and returns original value"
    
  - id: "per_axis_bounds_computation"
    description: "Can compute bounds per Y-axis from series data"
    check: "computeAxisBounds(seriesData, axisBindings) returns Map<String, DataRange>"
    
