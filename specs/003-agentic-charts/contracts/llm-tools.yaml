### modify_chart

Modify an existing chart in-place.

```yaml
name: modify_chart
description: |
  Modify an existing chart without recreating it. Only specify properties to change.
  Unspecified properties retain their current values.
  
input_schema:
  type: object
  required:
    - chart_id
  properties:
    chart_id:
      type: string
      description: The chart to modify
    title:
      type: string
    subtitle:
      type: string
    series_updates:
      type: array
      description: Updates to specific series by ID
      items:
        type: object
        required:
          - id
        properties:
          id:
            type: string
          color:
            type: string
          stroke_width:
            type: number
          visible:
            type: boolean
          # ... other series properties
    add_series:
      type: array
      description: New series to add
      items:
        $ref: '#/components/schemas/SeriesConfig'
    remove_series:
      type: array
      description: Series IDs to remove
      items:
        type: string
    x_axis:
      $ref: '#/components/schemas/XAxisConfig'
    y_axes:
      type: array
      items:
        $ref: '#/components/schemas/YAxisConfig'
    style:
      $ref: '#/components/schemas/StyleConfig'
    interactions:
      $ref: '#/components/schemas/InteractionConfig'

output_schema:
  type: object
  properties:
    chart_id:
      type: string
    success:
      type: boolean
    changes_applied:
      type: array
      items:
        type: string
```

