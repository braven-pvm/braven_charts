# LLM Tool Contracts: Agentic Charts

**Feature**: 003-agentic-charts  
**Date**: 2026-01-25  
**Format**: OpenAPI-style YAML schemas

## Tool Registry

| Tool | Purpose | Priority |
|------|---------|----------|
| `describe_data` | Discover columns/fields in loaded data | P1 |
| `load_data` | Load data from file/URL/inline | P1 |
| `create_chart` | Create a new chart | P1 |
| `modify_chart` | Modify existing chart | P1 |
| `process_data` | Apply transformations | P2 |
| `calculate_metric` | Compute scalar metrics | P2 |
| `add_annotation` | Add chart annotations | P2 |
| `export_chart` | Export as image/config | P3 |

---

## Tool Definitions

### describe_data

Discover columns and metadata from loaded data.

```yaml
name: describe_data
description: |
  Analyze loaded data to discover available columns, data types, and statistics.
  Call this after loading a file to understand what data is available for charting.
  
input_schema:
  type: object
  required:
    - data_id
  properties:
    data_id:
      type: string
      description: The UUID reference to previously loaded data (from load_data result)

output_schema:
  type: object
  properties:
    file_name:
      type: string
    file_type:
      type: string
      enum: [fit, csv, json]
    row_count:
      type: integer
    columns:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          type:
            type: string
            enum: [number, string, datetime, boolean]
          nullable:
            type: boolean
          stats:
            type: object
            properties:
              min:
                type: number
              max:
                type: number
              mean:
                type: number
              null_count:
                type: integer
          sample_values:
            type: array
    time_range:
      type: object
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        duration_seconds:
          type: integer
```

---

### load_data

Load data from a file attachment, URL, or inline content.

```yaml
name: load_data
description: |
  Load data from a file attachment, URL, or inline JSON/CSV content.
  Returns a data_id reference for use with other tools.
  For file attachments, use the file_id from the user's uploaded files.
  
input_schema:
  type: object
  required:
    - source
  properties:
    source:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [file, url, inline]
          description: The type of data source
        file_id:
          type: string
          description: File attachment ID (for type=file)
        url:
          type: string
          format: uri
          description: HTTP/HTTPS URL to fetch (for type=url)
        content:
          type: string
          description: Inline JSON or CSV content (for type=inline)
        format:
          type: string
          enum: [fit, csv, json, auto]
          description: Data format (auto-detected if not specified)

output_schema:
  type: object
  properties:
    data_id:
      type: string
      description: UUID reference for use with other tools
    row_count:
      type: integer
    column_count:
      type: integer
    columns:
      type: array
      items:
        type: string
    time_range:
      type: object
      nullable: true
```

