### calculate_metric

Compute scalar sport science metrics.

```yaml
name: calculate_metric
description: |
  Calculate sport science metrics like Normalized Power, TSS, or statistical measures.
  Returns computed scalar values.
  
input_schema:
  type: object
  required:
    - data_id
    - column
    - metric
  properties:
    data_id:
      type: string
    column:
      type: string
      description: Column to calculate metric from (e.g., "power")
    metric:
      type: string
      enum:
        - normalized_power
        - intensity_factor
        - training_stress_score
        - variability_index
        - efficiency_factor
        - mean
        - max
        - min
        - stdev
        - percentile
    ftp:
      type: number
      description: Functional Threshold Power (required for IF, TSS)
    lthr:
      type: number
      description: Lactate Threshold Heart Rate (for EF)
    percentile_value:
      type: number
      minimum: 0
      maximum: 100
      description: Percentile to calculate (for percentile metric)

output_schema:
  type: object
  properties:
    metric:
      type: string
    value:
      type: number
    unit:
      type: string
    formatted_value:
      type: string
    context:
      type: object
      description: Additional context (e.g., FTP used, duration)
```

