### add_annotation

Add annotations to an existing chart.

```yaml
name: add_annotation
description: |
  Add annotations like reference lines, zones, or labels to a chart.
  
input_schema:
  type: object
  required:
    - chart_id
    - annotation
  properties:
    chart_id:
      type: string
    annotation:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [horizontal_line, vertical_line, region, point_marker, text_label]
        y_value:
          type: number
          description: Y position (for horizontal_line)
        x_value:
          type: number
          description: X position (for vertical_line)
        x_start:
          type: number
        x_end:
          type: number
        y_start:
          type: number
        y_end:
          type: number
        color:
          type: string
        stroke_width:
          type: number
        dash:
          type: array
          items:
            type: number
        fill_color:
          type: string
        fill_opacity:
          type: number
        label:
          type: string
        label_position:
          type: string
          enum: [start, center, end]
        show_value:
          type: boolean

output_schema:
  type: object
  properties:
    annotation_id:
      type: string
    success:
      type: boolean
```

---

### export_chart

Export chart as image or configuration.

```yaml
name: export_chart
description: |
  Export a chart as a PNG image or JSON configuration.
  
input_schema:
  type: object
  required:
    - chart_id
    - format
  properties:
    chart_id:
      type: string
    format:
      type: string
      enum: [png, svg, json]
    resolution:
      type: string
      enum: [standard, high, publication]
      default: high
      description: Image resolution (300 DPI for publication)

output_schema:
  type: object
  properties:
    format:
      type: string
    file_name:
      type: string
    download_url:
      type: string
      description: URL or data URI for download
    config_json:
      type: object
      description: Chart configuration (for format=json)
```
