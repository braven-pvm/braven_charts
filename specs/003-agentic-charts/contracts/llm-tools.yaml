### create_chart

Create a new chart visualization.

```yaml
name: create_chart
description: |
  Create a new chart from data. Specify chart type, series, axes, and styling.
  Returns a chart_id for future modifications.
  
input_schema:
  type: object
  required:
    - chart_type
    - series
  properties:
    chart_type:
      type: string
      enum: [line, area, bar, scatter]
      description: Type of chart to create
    title:
      type: string
      description: Chart title
    subtitle:
      type: string
      description: Chart subtitle
    series:
      type: array
      minItems: 1
      items:
        type: object
        required:
          - id
        properties:
          id:
            type: string
            description: Unique series identifier
          name:
            type: string
            description: Display name for legend
          data_id:
            type: string
            description: Reference to loaded data
          data_column:
            type: string
            description: Column name for Y values
          x_column:
            type: string
            description: Column name for X values (defaults to index or timestamp)
          color:
            type: string
            description: Hex color (e.g., "#FF6B00") or named color
          stroke_width:
            type: number
            minimum: 0.5
            maximum: 10
          stroke_dash:
            type: array
            items:
              type: number
            description: Dash pattern (e.g., [5, 3])
          fill_opacity:
            type: number
            minimum: 0
            maximum: 1
          marker_style:
            type: string
            enum: [none, circle, square, triangle, diamond]
          marker_size:
            type: number
          interpolation:
            type: string
            enum: [linear, bezier, stepped, monotone]
          show_points:
            type: boolean
          y_axis_id:
            type: string
            description: Which Y-axis to use (for multi-axis charts)
          unit:
            type: string
            description: Unit label (e.g., "W", "bpm")
          visible:
            type: boolean
            default: true
    x_axis:
      type: object
      properties:
        label:
          type: string
        unit:
          type: string
        type:
          type: string
          enum: [numeric, time, category]
        min:
          type: number
        max:
          type: number
        auto_range:
          type: boolean
          default: true
        tick_format:
          type: string
        tick_rotation:
          type: number
        show_grid_lines:
          type: boolean
        grid_color:
          type: string
    y_axes:
      type: array
      maxItems: 4
      items:
        type: object
        properties:
          id:
            type: string
          label:
            type: string
          unit:
            type: string
          position:
            type: string
            enum: [left, right]
          min:
            type: number
          max:
            type: number
          auto_range:
            type: boolean
            default: true
          include_zero:
            type: boolean
          color:
            type: string
          show_grid_lines:
            type: boolean
    style:
      type: object
      properties:
        background_color:
          type: string
        show_grid:
          type: boolean
        grid_color:
          type: string
        grid_opacity:
          type: number
        show_legend:
          type: boolean
        legend_position:
          type: string
          enum: [top, bottom, left, right]
        theme:
          type: string
          enum: [light, dark, auto]
        padding_top:
          type: number
        padding_bottom:
          type: number
        padding_left:
          type: number
        padding_right:
          type: number
    interactions:
      type: object
      properties:
        enable_pan:
          type: boolean
        pan_direction:
          type: string
          enum: [horizontal, vertical, both]
        enable_zoom:
          type: boolean
        zoom_direction:
          type: string
          enum: [horizontal, vertical, both]
        enable_scrollbars:
          type: boolean
        show_crosshair:
          type: boolean
        crosshair_style:
          type: string
          enum: [full, horizontal, vertical]
        show_tooltip:
          type: boolean
        animate_on_load:
          type: boolean

output_schema:
  type: object
  properties:
    chart_id:
      type: string
      description: Unique chart identifier for future modifications
    success:
      type: boolean
    message:
      type: string
```

