### process_data

Apply transformations to loaded data.

```yaml
name: process_data
description: |
  Apply transformations to data (rolling averages, filtering, resampling, etc.).
  Returns a new data_id with the transformed data.
  
input_schema:
  type: object
  required:
    - data_id
    - operations
  properties:
    data_id:
      type: string
    operations:
      type: array
      items:
        oneOf:
          - type: object
            required: [type, columns]
            properties:
              type:
                const: select_columns
              columns:
                type: array
                items:
                  type: string
          - type: object
            required: [type, column, window_seconds, reducer]
            properties:
              type:
                const: rolling_window
              column:
                type: string
              window_seconds:
                type: number
              reducer:
                type: string
                enum: [mean, max, min, sum]
          - type: object
            required: [type, column, window_seconds, reducer]
            properties:
              type:
                const: fixed_window
              column:
                type: string
              window_seconds:
                type: number
              reducer:
                type: string
                enum: [mean, max, min, sum]
          - type: object
            required: [type, interval_seconds]
            properties:
              type:
                const: resample
              interval_seconds:
                type: number
              method:
                type: string
                enum: [interpolate, last, mean]
          - type: object
            required: [type, column]
            properties:
              type:
                const: normalize
              column:
                type: string
              method:
                type: string
                enum: [min_max, z_score]
          - type: object
            required: [type, column]
            properties:
              type:
                const: clip
              column:
                type: string
              min:
                type: number
              max:
                type: number

output_schema:
  type: object
  properties:
    data_id:
      type: string
      description: New data reference with transformed data
    row_count:
      type: integer
```

