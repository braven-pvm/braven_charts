name: braven_charts
description: "A comprehensive Flutter charting library with advanced customization and annotation capabilities."
version: 0.1.0
homepage: https://github.com/yourusername/braven_charts_v2.0
repository: https://github.com/yourusername/braven_charts_v2.0
issue_tracker: https://github.com/yourusername/braven_charts_v2.0/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing frameworks
  test: ^1.24.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

  # Widget and integration testing
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter

  # Web-specific testing
  web: ^1.1.0
  js: ^0.7.1

  # Golden file testing
  golden_toolkit: ^0.15.0
  alchemist: ^0.7.0

  # Test coverage
  coverage: ^1.6.0

  # Performance testing
  benchmark_harness: ^2.2.0

  # Mocking and test utilities
  fake_async: ^1.3.0
  meta: ^1.9.0

  # Code generation for mocks
  json_annotation: ^4.8.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
