name: braven_charts
description: "A comprehensive Flutter charting library with advanced customization and annotation capabilities."
version: 0.1.0
homepage: https://github.com/yourusername/braven_charts_v2.0
repository: https://github.com/yourusername/braven_charts_v2.0
issue_tracker: https://github.com/yourusername/braven_charts_v2.0/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  braven_data:
    git:
      url: https://github.com/forcegage-pvm/braven_data.git
  flex_color_picker: ^3.7.1
  fleather: ^1.26.0 # Rich text editor for TextAnnotation
  parchment: ^1.25.1 # Document model for fleather (Delta format serialization)

  # Agentic Charts dependencies
  anthropic_sdk_dart: ^0.2.3
  http: ^1.2.0
  uuid: ^4.0.0
  json_annotation: ^4.8.0
  google_fonts: ^8.0.0
  gpt_markdown: ^1.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing frameworks
  test: ^1.26.3
  mockito: ^5.4.0
  build_runner: ^2.4.0

  # Widget and integration testing
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter

  # Web-specific testing
  web: ^1.1.0

  # Golden file testing
  golden_toolkit: ^0.15.0
  alchemist: ^0.13.0

  # Test coverage
  coverage: ^1.6.0

  # Performance testing
  benchmark_harness: ^2.2.0

  # Mocking and test utilities
  fake_async: ^1.3.0
  meta: ^1.9.0

  # Code generation for mocks and JSON serialization
  json_serializable: ^6.6.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
