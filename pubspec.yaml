name: braven_charts
description: "A comprehensive Flutter charting library with advanced customization and annotation capabilities."
version: 0.1.0
homepage: https://github.com/yourusername/braven_charts_v2.0
repository: https://github.com/yourusername/braven_charts_v2.0
issue_tracker: https://github.com/yourusername/braven_charts_v2.0/issues

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  braven_data:
    git:
      url: https://github.com/forcegage-pvm/braven_data.git
  flex_color_picker: ^3.7.1
  fleather: ^1.26.0
  parchment: ^1.25.1
  flutter_colorpicker: ^1.1.0
  file_picker: ^8.0.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.5
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.26.3
  mockito: ^5.4.1
  build_runner: ^2.4.5

flutter:
  uses-material-design: true
