include: package:flutter_lints/flutter.yaml

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options

analyzer:
  exclude:
    - specs/** # Contract interface files not meant to be compiled yet
    - docs/archive_release_1.0/** # Archived release 1.0 source snapshots
    - test/charts/** # Chart tests for unimplemented features
    - test/integration/coordinates/** # Coordinate integration tests for unimplemented features
    - test/widgets/contracts/** # Widget contract tests for unimplemented features
    - example/lib/screens/** # Example screens for unimplemented features
    - test/interaction/contracts/gesture_recognizer_contract_test.dart # TDD test needs rewriting
    - test/interaction/contracts/keyboard_handler_contract_test.dart # Not yet implemented
    - test/interaction/unit/gesture_recognizer_test.dart # TDD test needs rewriting
    - test/interaction/unit/keyboard_handler_test.dart # Not yet implemented
    - lib/legacy/** # Legacy code with deprecated APIs
    - example/** # Example code - not production
    - .example/** # Local showcase app (non-production)
    - test/** # Test utilities use deprecated Flutter test APIs
  errors:
    # Coordinate system specific rules
    missing_enum_constant_in_switch: error # Exhaustive switch for CoordinateSystem enum
    prefer_const_constructors: error # Enforce const constructors for immutability
    prefer_final_fields: error # Enforce immutability patterns
    # Ignore deprecation warnings from Flutter framework updates
    deprecated_member_use: ignore
    # Style preferences
    prefer_initializing_formals: ignore # Explicit initialization is clearer in some cases
    sort_constructors_first: ignore # Fields before constructor is acceptable

linter:
  rules:
    # Immutability and const patterns (coordinate system requirement)
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_final_fields: true
    prefer_final_locals: true

    # Enum exhaustiveness (CoordinateSystem enum requirement)
    exhaustive_cases: true

    # Code quality
    avoid_print: true
    avoid_unnecessary_containers: true
    prefer_single_quotes: true
    # sort_constructors_first: true  # Disabled - fields before constructor is acceptable
    # prefer_initializing_formals: true  # Disabled - explicit initialization is clearer in some cases
